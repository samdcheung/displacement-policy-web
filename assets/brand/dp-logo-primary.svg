<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" width="420" height="180">
  <defs>
    <!-- Canela-style serif via system fallback; embed Google Fonts link for web use -->
    <style>
      .wordmark-line1 {
        font-family: 'Canela', 'Playfair Display', 'Georgia', serif;
        font-size: 36px;
        font-weight: 400;
        fill: #1a2c3d;
        letter-spacing: -0.5px;
      }
      .wordmark-line2 {
        font-family: 'Canela', 'Playfair Display', 'Georgia', serif;
        font-size: 36px;
        font-weight: 400;
        fill: #1a2c3d;
        letter-spacing: -0.5px;
      }
      .tagline {
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        font-size: 8.5px;
        font-weight: 500;
        fill: #c8882a;
        letter-spacing: 2.8px;
        text-transform: uppercase;
      }
    </style>
  </defs>

  <!-- ── HEXAGON MARK ── -->
  <!-- Hexagon helper: flat-top hexagons, center (cx,cy), size r -->
  <!-- Large navy hexagon, center ~(68, 72) -->
  <polygon
    points="68,30 104,51 104,93 68,114 32,93 32,51"
    fill="#1a2c3d"
  />

  <!-- Medium teal hexagon, offset up-right, center ~(88, 54) -->
  <polygon
    points="88,18 118,35 118,69 88,86 58,69 58,35"
    fill="#2a7a9b"
    opacity="0.92"
  />

  <!-- Gold outline hexagon, offset down-right, center ~(96, 96) -->
  <polygon
    points="96,62 122,77 122,107 96,122 70,107 70,77"
    fill="none"
    stroke="#c8882a"
    stroke-width="2.2"
  />

  <!-- ── WORDMARK ── -->
  <text x="148" y="78" class="wordmark-line1">Displacement</text>
  <text x="148" y="118" class="wordmark-line2">Policy</text>

  <!-- ── TAGLINE ── -->
  <text x="148" y="147" class="tagline">Research on Displacement Governance</text>
</svg>
