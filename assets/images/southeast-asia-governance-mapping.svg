<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Southeast Asia Mapping Project abstract visualization</title>
  <desc id="desc">A dark navy and teal abstract visualization of Southeast Asia with gold governance network nodes and flowing connections.</desc>
  <defs>
    <radialGradient id="bg" cx="42%" cy="42%" r="72%">
      <stop offset="0" stop-color="#0b3f57"/>
      <stop offset="0.48" stop-color="#062b45"/>
      <stop offset="1" stop-color="#031d31"/>
    </radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d6b7a"/>
      <stop offset="0.52" stop-color="#0f5268"/>
      <stop offset="1" stop-color="#08384f"/>
    </linearGradient>
    <linearGradient id="land2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#246f7a"/>
      <stop offset="1" stop-color="#0d4056"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#01101b" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grain" width="180" height="180" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="18" r="1" fill="#ffffff" opacity="0.04"/>
      <circle cx="95" cy="62" r="1.2" fill="#ffffff" opacity="0.035"/>
      <circle cx="143" cy="128" r="0.9" fill="#d6b26b" opacity="0.06"/>
      <path d="M0 120 C45 100 90 145 180 112" stroke="#ffffff" stroke-width="0.5" opacity="0.025" fill="none"/>
    </pattern>
    <style>
      .land{fill:url(#land);stroke:#7ca4a9;stroke-width:1.2;stroke-opacity:.22;filter:url(#softShadow)}
      .land-alt{fill:url(#land2);stroke:#8ab2b7;stroke-width:1;stroke-opacity:.18;filter:url(#softShadow)}
      .island{fill:#155a6a;stroke:#8ab2b7;stroke-width:.8;stroke-opacity:.18;filter:url(#softShadow)}
      .flow{fill:none;stroke:#c38424;stroke-width:2;stroke-opacity:.72;stroke-linecap:round}
      .flow-thin{fill:none;stroke:#d4a64d;stroke-width:1.1;stroke-opacity:.45;stroke-linecap:round}
      .flow-dash{fill:none;stroke:#c38424;stroke-width:1.2;stroke-opacity:.45;stroke-linecap:round;stroke-dasharray:8 12}
      .contour{fill:none;stroke:#348198;stroke-width:1.2;stroke-opacity:.28;stroke-linecap:round}
      .node{fill:#c78a2d;stroke:#f3cf84;stroke-width:1.5;filter:url(#glow)}
      .node-small{fill:#d3a34c;stroke:#f2d28a;stroke-width:1;filter:url(#glow)}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grain)" opacity=".75"/>

  <!-- flowing contour field -->
  <g opacity=".9">
    <path class="contour" d="M-80 230 C150 140 260 250 430 170 S700 90 910 170 1210 180 1690 70"/>
    <path class="contour" d="M-40 330 C180 260 330 310 500 245 S760 180 930 260 1210 330 1680 190"/>
    <path class="contour" d="M-90 455 C140 370 320 430 520 360 S820 290 1030 370 1280 480 1680 340"/>
    <path class="contour" d="M-40 610 C180 520 340 590 530 515 S790 455 990 520 1300 630 1660 520"/>
    <path class="contour" d="M-70 760 C170 670 360 720 560 650 S810 585 1060 645 1320 790 1680 700"/>
  </g>

  <!-- abstract SEA landmasses: simplified vector silhouettes, intentionally non-cartographic -->
  <g transform="translate(35 15)">
    <!-- mainland SEA -->
    <path class="land" d="M360 95 C410 83 445 117 455 160 C471 218 525 207 548 246 C580 301 544 354 582 394 C624 439 608 489 560 511 C517 531 487 503 454 522 C416 545 369 524 352 482 C337 444 358 407 326 381 C286 348 294 296 322 266 C355 230 325 190 332 145 C336 120 343 103 360 95 Z"/>
    <!-- Thailand/Malay peninsula -->
    <path class="land-alt" d="M403 470 C431 500 444 540 434 582 C425 621 443 657 469 690 C494 724 493 765 469 794 C439 759 415 716 407 671 C399 628 381 594 365 558 C345 512 356 481 403 470 Z"/>
    <!-- Myanmar west shape -->
    <path class="land-alt" d="M230 112 C292 95 337 129 340 178 C342 221 311 249 320 295 C329 339 299 378 258 372 C223 367 207 329 213 291 C220 245 184 218 191 174 C197 141 211 120 230 112 Z" opacity=".92"/>
    <!-- Vietnam coast -->
    <path class="land-alt" d="M582 263 C626 277 662 322 676 377 C690 432 671 485 700 537 C726 583 718 636 681 666 C651 621 622 570 623 515 C625 466 585 444 578 394 C572 352 590 318 582 263 Z" opacity=".9"/>
    <!-- Sumatra -->
    <path class="land" d="M343 626 C420 659 492 712 554 786 C511 811 439 780 378 723 C327 676 284 655 246 604 C278 590 313 605 343 626 Z"/>
    <!-- Java -->
    <path class="land-alt" d="M516 802 C615 788 736 791 842 817 C747 851 625 848 515 830 C481 824 481 808 516 802 Z"/>
    <!-- Borneo -->
    <path class="land" d="M705 565 C773 520 862 536 907 596 C947 650 925 736 863 766 C797 799 716 772 678 715 C643 661 655 598 705 565 Z"/>
    <!-- Philippines -->
    <path class="land-alt" d="M1030 293 C1068 284 1095 318 1080 354 C1068 382 1034 383 1018 357 C1000 328 1005 301 1030 293 Z"/>
    <path class="island" d="M1095 392 C1132 371 1174 389 1181 427 C1188 461 1155 486 1124 474 C1088 461 1071 418 1095 392 Z"/>
    <path class="island" d="M1048 470 C1084 465 1108 493 1095 525 C1084 553 1047 557 1028 533 C1006 504 1017 476 1048 470 Z"/>
    <path class="island" d="M1138 526 C1177 526 1206 553 1196 588 C1186 623 1146 631 1122 602 C1098 573 1107 535 1138 526 Z"/>
    <!-- Sulawesi and eastern islands -->
    <path class="land-alt" d="M962 621 C1010 600 1055 630 1041 668 C1032 693 995 684 977 708 C957 735 915 722 922 684 C928 653 943 631 962 621 Z" opacity=".9"/>
    <path class="island" d="M1096 683 C1155 668 1224 681 1275 723 C1206 734 1134 729 1085 706 C1063 696 1069 690 1096 683 Z"/>
    <path class="island" d="M1205 603 C1259 583 1315 594 1358 624 C1294 637 1236 633 1195 615 C1179 608 1185 601 1205 603 Z" opacity=".85"/>
    <!-- Papua edge / contextual, cropped -->
    <path class="land-alt" d="M1390 620 C1465 584 1535 604 1605 655 L1605 850 C1515 840 1442 804 1377 747 C1339 713 1344 644 1390 620 Z" opacity=".65"/>
    <!-- small islands -->
    <g opacity=".95">
      <circle class="island" cx="914" cy="789" r="12"/><circle class="island" cx="944" cy="802" r="7"/>
      <circle class="island" cx="1000" cy="795" r="9"/><circle class="island" cx="1043" cy="800" r="6"/>
      <circle class="island" cx="1140" cy="769" r="6"/><circle class="island" cx="1182" cy="765" r="5"/>
      <circle class="island" cx="1014" cy="402" r="5"/><circle class="island" cx="1165" cy="336" r="5"/>
    </g>
  </g>

  <!-- governance arcs and nodes -->
  <g>
    <path class="flow" d="M455 325 C580 210 735 205 910 315"/>
    <path class="flow" d="M455 325 C570 420 680 470 758 520"/>
    <path class="flow" d="M573 215 C690 260 795 285 965 320"/>
    <path class="flow" d="M758 520 C840 425 925 392 1005 340"/>
    <path class="flow" d="M758 520 C725 648 650 724 575 815"/>
    <path class="flow" d="M575 815 C725 772 855 744 962 710"/>
    <path class="flow" d="M962 710 C1058 650 1148 610 1268 600"/>
    <path class="flow-thin" d="M410 620 C525 560 650 540 758 520"/>
    <path class="flow-thin" d="M573 215 C530 370 488 505 410 620"/>
    <path class="flow-thin" d="M965 320 C1048 420 1120 510 1268 600"/>
    <path class="flow-dash" d="M120 360 C260 330 350 340 455 325"/>
    <path class="flow-dash" d="M120 580 C290 530 340 555 410 620"/>
    <path class="flow-dash" d="M965 320 C1135 245 1315 238 1515 300"/>
    <path class="flow-dash" d="M575 815 C760 870 1000 855 1290 780"/>
  </g>

  <!-- nodes -->
  <g>
    <circle class="node" cx="455" cy="325" r="13"/>
    <circle class="node" cx="573" cy="215" r="15"/>
    <circle class="node" cx="410" cy="620" r="16"/>
    <circle class="node" cx="758" cy="520" r="17"/>
    <circle class="node" cx="965" cy="320" r="14"/>
    <circle class="node" cx="575" cy="815" r="15"/>
    <circle class="node" cx="962" cy="710" r="12"/>
    <circle class="node" cx="1268" cy="600" r="10"/>
    <circle class="node-small" cx="720" cy="365" r="6"/>
    <circle class="node-small" cx="875" cy="460" r="5"/>
    <circle class="node-small" cx="1130" cy="520" r="5"/>
    <circle class="node-small" cx="295" cy="520" r="5"/>
    <circle class="node-small" cx="1335" cy="780" r="5"/>
    <circle class="node-small" cx="132" cy="360" r="4" opacity=".7"/>
    <circle class="node-small" cx="1488" cy="300" r="4" opacity=".7"/>
  </g>

  <!-- faint brand geometry -->
  <g opacity=".18" transform="translate(1235 95)">
    <path d="M80 0 L149 40 L149 120 L80 160 L11 120 L11 40 Z" fill="none" stroke="#e5b04a" stroke-width="2"/>
    <path d="M130 82 L199 122 L199 202 L130 242 L61 202 L61 122 Z" fill="none" stroke="#e5e1d6" stroke-width="2"/>
  </g>
  <rect width="1600" height="900" fill="#00131f" opacity=".08"/>
</svg>
