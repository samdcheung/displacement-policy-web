<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Fiscal Architecture of Displacement</title>
<desc id="desc">A systems diagram showing how humanitarian assistance, public budgets, social protection, and development finance connect to displacement response and long-term inclusion.</desc>
<rect width="1600" height="900" fill="#F8F5EF"/>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#082C3A" flood-opacity="0.10"/>
  </filter>
</defs>
<g opacity="0.18" stroke="#D8D2C7" stroke-width="1">
  <path d="M160 160H1440M160 300H1440M160 440H1440M160 580H1440M160 720H1440"/>
  <path d="M300 110V780M520 110V780M740 110V780M960 110V780M1180 110V780M1400 110V780"/>
</g>

<text x="120" y="105" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#1B1B1B">Fiscal Architecture of Displacement</text>
<text x="123" y="150" font-family="Inter, Arial, sans-serif" font-size="20" letter-spacing="4" fill="#B38A48">BUDGETS · SYSTEMS · FINANCE</text>
<line x1="120" y1="175" x2="230" y2="175" stroke="#B38A48" stroke-width="5"/>

<!-- center -->
<g filter="url(#shadow)">
  <circle cx="800" cy="455" r="115" fill="#082C3A"/>
  <polygon points="800,305 930,380 930,530 800,605 670,530 670,380" fill="none" stroke="#B38A48" stroke-width="3"/>
</g>
<text x="800" y="430" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F8F5EF">Displacement</text>
<text x="800" y="472" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F8F5EF">as public</text>
<text x="800" y="514" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F8F5EF">responsibility</text>

<!-- nodes -->
<g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
  <g transform="translate(310 310)">
    <rect x="-155" y="-70" width="310" height="140" rx="6" fill="#FFFFFF" stroke="#D8D2C7"/>
    <circle cx="-105" cy="0" r="26" fill="#EFE5D0" stroke="#B38A48" stroke-width="2"/>
    <text x="-60" y="-12" font-size="21" font-weight="700" fill="#1B1B1B">Humanitarian</text>
    <text x="-60" y="17" font-size="21" font-weight="700" fill="#1B1B1B">assistance</text>
    <text x="-60" y="45" font-size="15" fill="#54616B">Emergency funding and appeals</text>
  </g>
  <g transform="translate(1290 310)">
    <rect x="-155" y="-70" width="310" height="140" rx="6" fill="#FFFFFF" stroke="#D8D2C7"/>
    <circle cx="-105" cy="0" r="26" fill="#EFE5D0" stroke="#B38A48" stroke-width="2"/>
    <text x="-60" y="-12" font-size="21" font-weight="700" fill="#1B1B1B">Development</text>
    <text x="-60" y="17" font-size="21" font-weight="700" fill="#1B1B1B">finance</text>
    <text x="-60" y="45" font-size="15" fill="#54616B">Concessional and project finance</text>
  </g>
  <g transform="translate(310 620)">
    <rect x="-155" y="-70" width="310" height="140" rx="6" fill="#FFFFFF" stroke="#D8D2C7"/>
    <circle cx="-105" cy="0" r="26" fill="#DCE7E9" stroke="#123B52" stroke-width="2"/>
    <text x="-60" y="-12" font-size="21" font-weight="700" fill="#1B1B1B">Public</text>
    <text x="-60" y="17" font-size="21" font-weight="700" fill="#1B1B1B">budgets</text>
    <text x="-60" y="45" font-size="15" fill="#54616B">Domestic expenditure systems</text>
  </g>
  <g transform="translate(1290 620)">
    <rect x="-155" y="-70" width="310" height="140" rx="6" fill="#FFFFFF" stroke="#D8D2C7"/>
    <circle cx="-105" cy="0" r="26" fill="#DCE7E9" stroke="#123B52" stroke-width="2"/>
    <text x="-60" y="-12" font-size="21" font-weight="700" fill="#1B1B1B">Social</text>
    <text x="-60" y="17" font-size="21" font-weight="700" fill="#1B1B1B">protection</text>
    <text x="-60" y="45" font-size="15" fill="#54616B">Systems for inclusion and risk</text>
  </g>
</g>

<!-- links -->
<g fill="none" stroke-linecap="round" stroke-width="5">
  <path d="M465 310 C565 315 625 370 680 410" stroke="#B38A48"/>
  <path d="M1135 310 C1035 315 975 370 920 410" stroke="#B38A48"/>
  <path d="M465 620 C565 605 625 540 680 500" stroke="#123B52"/>
  <path d="M1135 620 C1035 605 975 540 920 500" stroke="#123B52"/>
</g>
<g fill="#F8F5EF" stroke="#082C3A" stroke-width="3">
  <circle cx="566" cy="340" r="10"/><circle cx="1034" cy="340" r="10"/><circle cx="566" cy="590" r="10"/><circle cx="1034" cy="590" r="10"/>
</g>

<!-- bottom pathway -->
<path d="M300 775 C520 730 650 740 800 740 C950 740 1080 730 1300 775" fill="none" stroke="#082C3A" stroke-width="4"/>
<text x="800" y="805" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#1B1B1B">Long-term inclusion depends on how fiscal responsibility is organised and sustained.</text>

<!-- small legend -->
<g transform="translate(120 210)" font-family="Inter, Arial, sans-serif">
  <rect x="0" y="0" width="330" height="32" fill="none"/>
  <circle cx="12" cy="14" r="7" fill="#B38A48"/><text x="30" y="20" font-size="15" fill="#54616B">External and crisis finance</text>
  <circle cx="230" cy="14" r="7" fill="#123B52"/><text x="248" y="20" font-size="15" fill="#54616B">Domestic systems</text>
</g>
</svg>