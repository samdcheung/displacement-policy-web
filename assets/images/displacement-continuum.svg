<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img">
  <title>The displacement continuum</title>
  <desc>A branded continuum diagram connecting risk, movement, settlement, inclusion and durable outcomes.</desc>
  <rect width="980" height="620" fill="#FAFBFB"/>
  <rect x="44" y="44" width="892" height="532" fill="#FFFFFF" stroke="#D5DBE1"/>
  <text x="72" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="48" fill="#1C1C1A">THE DISPLACEMENT CONTINUUM</text>
  <text x="72" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#415160">Population mobility sits across overlapping phases of exposure, movement, settlement and institutional inclusion.</text>
  <line x1="112" y1="336" x2="858" y2="336" stroke="#156082" stroke-width="7" stroke-linecap="round"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <circle cx="140" cy="336" r="34" fill="#156082"/>
    <circle cx="320" cy="336" r="34" fill="#E7F0F4" stroke="#156082" stroke-width="4"/>
    <circle cx="500" cy="336" r="34" fill="#E7F0F4" stroke="#156082" stroke-width="4"/>
    <circle cx="680" cy="336" r="34" fill="#E7F0F4" stroke="#156082" stroke-width="4"/>
    <circle cx="840" cy="336" r="34" fill="#1C1C1A"/>
    <text x="140" y="345" text-anchor="middle" font-size="25" font-weight="700" fill="#FFFFFF">1</text>
    <text x="320" y="345" text-anchor="middle" font-size="25" font-weight="700" fill="#156082">2</text>
    <text x="500" y="345" text-anchor="middle" font-size="25" font-weight="700" fill="#156082">3</text>
    <text x="680" y="345" text-anchor="middle" font-size="25" font-weight="700" fill="#156082">4</text>
    <text x="840" y="345" text-anchor="middle" font-size="25" font-weight="700" fill="#FFFFFF">5</text>
    <text x="140" y="430" text-anchor="middle" font-size="22" font-weight="700" fill="#1C1C1A">Risk</text>
    <text x="320" y="430" text-anchor="middle" font-size="22" font-weight="700" fill="#1C1C1A">Movement</text>
    <text x="500" y="430" text-anchor="middle" font-size="22" font-weight="700" fill="#1C1C1A">Settlement</text>
    <text x="680" y="430" text-anchor="middle" font-size="22" font-weight="700" fill="#1C1C1A">Inclusion</text>
    <text x="840" y="430" text-anchor="middle" font-size="22" font-weight="700" fill="#1C1C1A">Durability</text>
    <text x="140" y="464" text-anchor="middle" font-size="16" fill="#61717A">Exposure and</text>
    <text x="140" y="486" text-anchor="middle" font-size="16" fill="#61717A">institutional stress</text>
    <text x="320" y="464" text-anchor="middle" font-size="16" fill="#61717A">Forced and</text>
    <text x="320" y="486" text-anchor="middle" font-size="16" fill="#61717A">adaptive mobility</text>
    <text x="500" y="464" text-anchor="middle" font-size="16" fill="#61717A">Access to place,</text>
    <text x="500" y="486" text-anchor="middle" font-size="16" fill="#61717A">services and work</text>
    <text x="680" y="464" text-anchor="middle" font-size="16" fill="#61717A">National systems</text>
    <text x="680" y="486" text-anchor="middle" font-size="16" fill="#61717A">and protection</text>
    <text x="840" y="464" text-anchor="middle" font-size="16" fill="#61717A">Rights, finance</text>
    <text x="840" y="486" text-anchor="middle" font-size="16" fill="#61717A">and public capacity</text>
  </g>
  <rect x="72" y="530" width="44" height="3" rx="1.5" fill="#156082"/>
</svg>
