tion.","applicability":"Geographic scope: Africa. Public systems: Cross-sector governance. Displacement contexts: Internal displacement, Refugee hosting.","relatedMappingRecordIds":[],"sourceStatus":"Secondary source"},{"id":"unidad-para-las-v-ctimas-registro-nico-de-v-ctimas","slug":"unidad-para-las-v-ctimas-registro-nico-de-v-ctimas","referenceTitle":"Unidad para las Víctimas: Registro Único de Víctimas","referenceType":"Other","authorInstitution":"unidadvictimas.gov.co","year":null,"countryRegion":["Colombia"],"url":"https://www.unidadvictimas.gov.co/registro-unico-de-victimas-ruv/","citation":"Unidad para las Víctimas: Registro Único de Víctimas","relevance":"Supports the mapping of Colombia Registro Único de Víctimas.","applicability":"Geographic scope: Colombia. Public systems: Social protection. Displacement contexts: Internal displacement.","relatedMappingRecordIds":["colombia-registro-unico-victimas"],"sourceStatus":"Official source"},{"id":"unidad-en-l-nea","slug":"unidad-en-l-nea","referenceTitle":"Unidad en Línea","referenceType":"Other","authorInstitution":"unidadenlinea.unidadvictimas.gov.co","year":null,"countryRegion":["Colombia"],"url":"https://unidadenlinea.unidadvictimas.gov.co/","citation":"Unidad en Línea","relevance":"Supports the mapping of Colombia Registro Único de Víctimas.","applicability":"Geographic scope: Colombia. Public systems: Social protection. Displacement contexts: Internal displacement.","relatedMappingRecordIds":["colombia-registro-unico-victimas"],"sourceStatus":"Official source"},{"id":"unidad-para-las-v-ctimas-official-website","slug":"unidad-para-las-v-ctimas-official-website","referenceTitle":"Unidad para las Víctimas official website","referenceType":"Other","authorInstitution":"unidadvictimas.gov.co","year":null,"countryRegion":["Colombia"],"url":"https://www.unidadvictimas.gov.co/","citation":"Unidad para las Víctimas official website","relevance":"Supports the mapping of Colombia Registro Único de Víctimas.","applicability":"Geographic scope: Colombia. Public systems: Social protection. Displacement contexts: Internal displacement.","relatedMappingRecordIds":["colombia-registro-unico-victimas"],"sourceStatus":"Official source"},{"id":"infopa-lante-explainer-on-the-ruv","slug":"infopa-lante-explainer-on-the-ruv","referenceTitle":"InfoPa'lante explainer on the RUV","referenceType":"Academic article","authorInstitution":"infopalante.org","year":null,"countryRegion":["Colombia"],"url":"https://www.infopalante.org/articles/16432423264285","citation":"InfoPa'lante explainer on the RUV","relevance":"Supports the mapping of Colombia Registro Único de Víctimas.","applicability":"Geographic scope: Colombia. Public systems: Social protection. Displacement contexts: Internal displacement.","relatedMappingRecordIds":["colombia-registro-unico-victimas"],"sourceStatus":"Secondary source"},{"id":"instrument-aalco-bangkok-principles","slug":"instrument-aalco-bangkok-principles","referenceTitle":"AALCO Bangkok Principles","referenceType":"Strategy or framework","authorInstitution":"Asian-African Legal Consultative Organization","year":null,"countryRegion":["Asia and Africa"],"url":"https://www.aalco.int/final%20text%20of%20bangkok%20principles.pdf","citation":"AALCO Bangkok Principles","relevance":"The Bangkok Principles illustrate the difference between normative protection architecture and operational inclusion. They are important for understanding Asian and African regional approaches to refugee protection, but a governance map must ask whether such principles connect to systems people actually use. The political economy archetype is sovereignty-preserving ambiguity: states accept a shared vocabulary while retaining discretion over recognition, services, and fiscal responsibility.","applicability":"Continuity breaks when regional principles are not translated into domestic legal status, civil registration, budget lines, health coverage, education access, work authorization, or portable documentation. Protection remains normatively acknowledged but institutionally thin.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["aalco-final-text-of-the-bangkok-principles","aalco-official-website","refworld-entry-on-the-bangkok-principles"]},{"id":"instrument-guiding-principles-internal-displacement","slug":"instrument-guiding-principles-internal-displacement","referenceTitle":"Guiding Principles on Internal Displacement","referenceType":"Law or regulation","authorInstitution":"United Nations","year":null,"countryRegion":["Global"],"url":"https://www.unocha.org/publications/report/world/guiding-principles-internal-displacement-0","citation":"Guiding Principles on Internal Displacement","relevance":"The Guiding Principles are foundational for IDP governance, but they do not themselves create an implementation architecture. The governance problem is whether national systems can carry responsibility across prevention, emergency response, protracted displacement, return, local integration, and settlement elsewhere. The political economy archetype is normative responsibility without automatic fiscal absorption.","applicability":"Continuity breaks when IDP recognition is not connected to civil registration, housing, land and property systems, social protection, education, health care, local government finance, durable solutions planning, or post-return accountability.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["ocha-guiding-principles-on-internal-displacement","un-digital-library-record","idmc-publication-page"]},{"id":"instrument-un-action-agenda-internal-displacement","slug":"instrument-un-action-agenda-internal-displacement","referenceTitle":"UN Secretary-General Action Agenda on Internal Displacement","referenceType":"Law or regulation","authorInstitution":"United Nations","year":null,"countryRegion":["Global"],"url":"https://www.un.org/en/content/action-agenda-on-internal-displacement/","citation":"UN Secretary-General Action Agenda on Internal Displacement","relevance":"The Action Agenda is central to the Mapping because it articulates the move from humanitarian response to governance architecture. It asks whether internal displacement can be absorbed into ordinary national systems, local development, prevention, and financing. The political economy archetype is development-system absorption under conditions of national ownership and donor alignment.","applicability":"Continuity breaks when emergency assistance does not transition into development planning, when local authorities lack resources, when IDP data are not integrated into national statistics, or when solutions strategies lack budget authority.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["un-action-agenda-on-internal-displacement-page","action-agenda-pdf","2024-action-agenda-progress-report"]},{"id":"instrument-global-compact-on-refugees","slug":"instrument-global-compact-on-refugees","referenceTitle":"Global Compact on Refugees","referenceType":"Law or regulation","authorInstitution":"United Nations / UNHCR","year":null,"countryRegion":["Global"],"url":"https://globalcompactrefugees.org/","citation":"Global Compact on Refugees","relevance":"The compact is a key global instrument for sustainable inclusion because it legitimises refugee access to ordinary systems while recognising host-country costs. The political economy archetype is conditional inclusion through responsibility sharing: host states may include refugees when international financing, development cooperation, and political incentives align.","applicability":"Continuity breaks when pledges do not translate into budget support, when refugee inclusion remains project-based, when host states restrict legal status or work rights, or when national systems lack capacity to absorb additional users.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["global-compact-on-refugees-official-platform","global-compact-on-refugees-pdf","unhcr-global-compact-on-refugees-booklet"]},{"id":"instrument-global-compact-safe-orderly-regular-migration","slug":"instrument-global-compact-safe-orderly-regular-migration","referenceTitle":"Global Compact for Safe, Orderly and Regular Migration","referenceType":"Law or regulation","authorInstitution":"United Nations / IOM","year":null,"countryRegion":["Global"],"url":"https://www.ohchr.org/en/migration/global-compact-safe-orderly-and-regular-migration-gcm","citation":"Global Compact for Safe, Orderly and Regular Migration","relevance":"The compact is important for displacement governance because many displaced people are administratively treated as migrants when they move outside refugee or IDP categories. The political economy archetype is managed mobility with rights language: cooperation expands, but domestic status control remains central.","applicability":"Continuity breaks when migrants move between regular and irregular status, when service access depends on documentation, when labour protections do not follow across borders, or when return and reintegration are not connected to social protection and local development systems.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["ohchr-page-on-the-global-compact-for-migration","iom-global-compact-for-migration-page","global-compact-for-migration-final-draft-pdf"]},{"id":"instrument-world-bank-ess5","slug":"instrument-world-bank-ess5","referenceTitle":"World Bank ESS5","referenceType":"Safeguard or standard","authorInstitution":"World Bank","year":null,"countryRegion":["Global"],"url":"https://www.worldbank.org/en/projects-operations/environmental-and-social-framework/brief/environmental-and-social-standards","citation":"World Bank ESS5","relevance":"ESS5 is central to displacement governance because it shows how development finance creates obligations, while also showing how project logic can narrow responsibility by time, territory, and causation. The political economy archetype is safeguard-based mitigation: displacement is governed as project risk rather than as long-term inclusion.","applicability":"Continuity breaks when compensation or resettlement action plans are treated as project deliverables rather than bridges into ordinary housing, livelihood, land administration, civil registration, social protection, and service systems.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["world-bank-environmental-and-social-standards","world-bank-environmental-and-social-framework-pdf","ess5-fact-sheet-pdf"]},{"id":"instrument-ifc-performance-standard-5","slug":"instrument-ifc-performance-standard-5","referenceTitle":"IFC Performance Standard 5","referenceType":"Safeguard or standard","authorInstitution":"International Finance Corporation","year":null,"countryRegion":["Global"],"url":"https://www.ifc.org/en/insights-reports/2012/ifc-performance-standard-5","citation":"IFC Performance Standard 5","relevance":"Performance Standard 5 shows how displacement governance is increasingly mediated by private finance, ESG risk, lender requirements, and corporate due diligence. The political economy archetype is private-risk internalisation: displacement is governed to protect affected people and manage project risk, but public-system absorption remains external to the standard.","applicability":"Continuity breaks when livelihood restoration is time-limited, when company-managed processes are not connected to public land administration or social services, or when accountability weakens after financial close or project completion.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["ifc-performance-standard-5-page","ifc-performance-standard-5-pdf","ifc-performance-standards-overview","ifc-guidance-note-5-pdf"]},{"id":"instrument-asean-five-point-consensus-myanmar","slug":"instrument-asean-five-point-consensus-myanmar","referenceTitle":"ASEAN Five-Point Consensus on Myanmar","referenceType":"Strategy or framework","authorInstitution":"ASEAN","year":null,"countryRegion":["Myanmar","ASEAN"],"url":"https://asean.org/chairmans-statement-on-the-asean-leaders-meeting-24-april-2021-and-five-point-consensus/","citation":"ASEAN Five-Point Consensus on Myanmar","relevance":"The Five-Point Consensus shows the limits of regional diplomacy when displacement is produced by conflict and state violence. It is relevant to Mapping because it reveals a gap between regional political process and operational protection continuity. The political economy archetype is sovereignty-constrained humanitarian diplomacy.","applicability":"Continuity breaks where humanitarian access is blocked, violence continues, ASEAN mechanisms cannot reach affected areas, or assistance is not connected to protection monitoring, local systems, or cross-border realities.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["asean-chairman-s-statement-on-the-leaders-meeting-24-april-2021","asean-official-website","ap-r2p-report-on-asean-and-the-myanmar-humanitarian-crisis"]},{"id":"instrument-asean-declaration-rights-migrant-workers","slug":"instrument-asean-declaration-rights-migrant-workers","referenceTitle":"ASEAN Declaration on the Protection and Promotion of the Rights of Migrant Workers","referenceType":"Strategy or framework","authorInstitution":"ASEAN","year":null,"countryRegion":["ASEAN"],"url":"https://arc-agreement.asean.org/file/doc/2015/02/asean-declaration-on-the-protection-and-promotion-of-the-rights-of-migrant-workers.pdf","citation":"ASEAN Declaration on the Protection and Promotion of the Rights of Migrant Workers","relevance":"The declaration is important for displacement governance because many displaced or crisis-affected people move through labour migration channels rather than refugee or IDP systems. The political economy archetype is managed labour mobility with bounded protection: states recognise worker welfare while maintaining control over admission, status, and enforcement.","applicability":"Continuity breaks when recruitment, employment, residence, health insurance, social security, and complaints systems are not portable across employers, sectors, borders, or status changes.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["asean-declaration-on-migrant-workers-pdf","asean-official-website","nus-centre-for-international-law-copy-of-the-declaration"]},{"id":"instrument-unhcr-registration-humanitarian-identity-infrastructure","slug":"instrument-unhcr-registration-humanitarian-identity-infrastructure","referenceTitle":"UNHCR Registration as Humanitarian Identity Infrastructure","referenceType":"Other","authorInstitution":"UNHCR","year":null,"countryRegion":["Global"],"url":"https://www.unhcr.org/registration-guidance/","citation":"UNHCR Registration as Humanitarian Identity Infrastructure","relevance":"This is a foundational layer for displacement governance because data inclusion is often mistaken for system inclusion. The political economy archetype is humanitarian legibility without legal absorption.","applicability":"Continuity breaks when UNHCR records do not interoperate with national civil registration, health, education, social protection, labour, or immigration systems, or when host states do not recognize UNHCR documentation for access.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["unhcr-registration-and-identity-management-guidance","unhcr-thailand-registration-and-documents-page","unhcr-operational-data-portal"]},{"id":"instrument-adb-safeguards-environmental-social-framework","slug":"instrument-adb-safeguards-environmental-social-framework","referenceTitle":"ADB Safeguard Policy Statement and Environmental and Social Framework","referenceType":"Strategy or framework","authorInstitution":"Asian Development Bank","year":null,"countryRegion":["Asia and the Pacific"],"url":"https://www.adb.org/documents/safeguard-policy-statement","citation":"ADB Safeguard Policy Statement and Environmental and Social Framework","relevance":"ADB's framework is crucial for Southeast Asia because major infrastructure and development projects often generate displacement risk. The political economy archetype is safeguard-based mitigation: displacement is governed as a project compliance issue, not automatically as a long-term inclusion responsibility.","applicability":"Continuity breaks when resettlement plans, compensation, livelihood restoration, or grievance mechanisms remain project-bounded and do not connect affected people to land administration, housing, social protection, civil registration, or local development systems.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["adb-safeguard-policy-statement","adb-environmental-and-social-framework","adb-environmental-and-social-requirements"]},{"id":"instrument-oecd-social-protection-for-forcibly-displaced","slug":"instrument-oecd-social-protection-for-forcibly-displaced","referenceTitle":"OECD Social Protection for the Forcibly Displaced","referenceType":"Strategy or framework","authorInstitution":"OECD","year":null,"countryRegion":["Global","Low- and middle-income countries"],"url":"https://www.oecd.org/en/publications/social-protection-for-the-forcibly-displaced-in-low-and-middle-income-countries_5299cb92-en.html","citation":"OECD Social Protection for the Forcibly Displaced","relevance":"This is one of the clearest analytical bridges between forced displacement and ordinary social protection systems. The political economy archetype is de jure inclusion with de facto exclusion: policy may allow access, but administrative, fiscal, and political barriers determine whether people actually receive support.","applicability":"Continuity breaks between legal eligibility and actual access, between humanitarian assistance and state systems, between refugee/IDP databases and citizen registries, and between short-term financing and recurrent entitlements.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["oecd-social-protection-for-the-forcibly-displaced","oecd-paper-pdf","reliefweb-publication-entry"]},{"id":"instrument-world-bank-adaptive-social-protection-framework","slug":"instrument-world-bank-adaptive-social-protection-framework","referenceTitle":"World Bank Adaptive Social Protection Framework","referenceType":"Strategy or framework","authorInstitution":"World Bank","year":null,"countryRegion":["Global"],"url":"https://www.worldbank.org/en/publication/human-capital/publication/adaptive-social-protection-building-resilience-to-shocks-key-findings","citation":"World Bank Adaptive Social Protection Framework","relevance":"Adaptive social protection is essential for the displacement continuum because it addresses shocks before, during, and after crisis. The political economy archetype is shock-responsive expansion with registry dependency: systems can scale, but only for people they can see and finance.","applicability":"Continuity breaks when shock response expands vertically or horizontally for registered households but does not capture displaced people who have moved, lost documents, crossed borders, or fallen outside standard poverty targeting.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["world-bank-adaptive-social-protection-key-findings","adaptive-social-protection-building-resilience-to-shocks-pdf","ieg-evaluation-on-adaptive-social-protection-in-crisis-response"]},{"id":"instrument-sendai-framework-disaster-risk-reduction","slug":"instrument-sendai-framework-disaster-risk-reduction","referenceTitle":"Sendai Framework for Disaster Risk Reduction","referenceType":"Strategy or framework","authorInstitution":"United Nations","year":null,"countryRegion":["Global"],"url":"https://www.undrr.org/publication/sendai-framework-disaster-risk-reduction-2015-2030","citation":"Sendai Framework for Disaster Risk Reduction","relevance":"The Sendai Framework is essential for displacement governance because it situates displacement before the crisis: in exposure, vulnerability, land use, preparedness, and recovery planning. The political economy archetype is prevention-oriented risk governance with weak individual entitlement.","applicability":"Continuity breaks when risk data do not identify displacement risk, when evacuation does not connect to recovery, or when build-back-better processes fail to restore housing, livelihoods, documentation, and local services.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["undrr-sendai-framework-publication-page","undrr-what-is-the-sendai-framework","sendai-framework-pdf"]},{"id":"instrument-platform-disaster-displacement-nansen-protection-agenda","slug":"instrument-platform-disaster-displacement-nansen-protection-agenda","referenceTitle":"Platform on Disaster Displacement and Nansen Protection Agenda","referenceType":"Strategy or framework","authorInstitution":"Platform on Disaster Displacement","year":null,"countryRegion":["Global"],"url":"https://disasterdisplacement.org/","citation":"Platform on Disaster Displacement and Nansen Protection Agenda","relevance":"This entry captures one of the main gaps in the displacement continuum: people displaced across borders by disasters often do not fit refugee law but still require protection. The political economy archetype is tool-based protection without a binding status category.","applicability":"Continuity breaks when admission is temporary, when protection tools are discretionary, when return is unsafe, or when people move from disaster response into irregular migration status.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["platform-on-disaster-displacement-official-website","iom-page-on-platform-on-disaster-displacement","nansen-initiative-protection-agenda-pdf"]},{"id":"instrument-iasc-framework-durable-solutions-idps","slug":"instrument-iasc-framework-durable-solutions-idps","referenceTitle":"IASC Framework on Durable Solutions for Internally Displaced Persons","referenceType":"Strategy or framework","authorInstitution":"Inter-Agency Standing Committee","year":null,"countryRegion":["Global"],"url":"https://interagencystandingcommittee.org/sites/default/files/migrated/2021-03/IASC%20Framework%20on%20Durable%20Solutions%20for%20Internally%20Displaced%20Persons%2C%20April%202010.pdf","citation":"IASC Framework on Durable Solutions for Internally Displaced Persons","relevance":"The framework is central to the displacement continuum because it defines solutions as more than physical movement. The political economy archetype is solutions criteria without automatic implementation authority.","applicability":"Continuity breaks when IDPs leave emergency assistance but do not regain housing, land, livelihoods, documentation, security, education, health access, or participation in local governance.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["iasc-durable-solutions-framework-pdf","iasc-durable-solutions-framework-final-pdf","unhcr-hosted-copy-of-iasc-framework"]},{"id":"instrument-kampala-convention","slug":"instrument-kampala-convention","referenceTitle":"Kampala Convention","referenceType":"Strategy or framework","authorInstitution":"African Union","year":null,"countryRegion":["Africa"],"url":"https://au.int/sites/default/files/treaties/36846-treaty-kampala_convention.pdf","citation":"Kampala Convention","relevance":"The Kampala Convention is a benchmark for legal architecture on internal displacement. It shows what stronger legal responsibility can look like, but also why law alone is insufficient without fiscal and administrative absorption. The political economy archetype is binding responsibility with implementation dependency.","applicability":"Continuity breaks when treaty obligations are not incorporated into national law, when institutions lack budgets, when local authorities lack capacity, or when IDPs cannot access remedies and services.","relatedMappingRecordIds":[],"sourceStatus":"Canonical instrument or framework","supportingReferenceIds":["african-union-kampala-convention-pdf","african-union-treaties-page","right-to-education-resource-page-on-kampala-convention"]}],"profiles":[{"country":"Cambodia","profileType":"Regional core","overview":"Cambodia's displacement governance sits across disaster exposure, statelessness risks, labour mobility, and development-induced displacement. Expanding public systems create inclusion opportunities, but documentation, local capacity, and project-to-system financing remain central constraints. The IDPoor social registry has shifted since 2020 to on-demand digital registration (formalized by the 2023 CRVSID law, with biometric eID rollout from 2025), narrowing the registry-cycle gap that previously left mobile households waiting years between survey rounds.","mainDisplacementContexts":["Disaster displacement","Statelessness","Labour mobility","Development-induced displacement"],"institutionalArchitecture":["Disaster management authority","Migration/interior authority","Social protection agency","Local government actors","Development finance actors"],"mainGovernancePatterns":["Documentation and eligibility","Registry interoperability","Territorial portability","Municipal absorption","Project-to-system financing"],"reformOpportunities":"Strengthen registration pathways for mobile and vulnerable households, connect affected household records to social protection and local planning systems, and require post-resettlement service audits for infrastructure-linked displacement.","priorityPublicSystems":["Housing, land and resettlement"],"keyReferenceIds":["cambodia-land-law-english-pdf","council-for-the-development-of-cambodia-land","open-development-cambodia-land-law-2001"],"relatedMappingRecordIds":["cambodia-land-law-economic-land-concessions"]},{"country":"Indonesia","profileType":"Regional core","overview":"Indonesia's displacement governance spans disaster risk, internal displacement, refugee/asylum issues, infrastructure-linked relocation, and labour mobility. Disaster systems provide important continuity for citizens, while refugees and some mobile groups remain less connected to ordinary systems.","mainDisplacementContexts":["Refugees","Internal displacement","Disaster displacement","Labour mobility","Development-induced displacement"],"institutionalArchitecture":["Disaster management authority","Migration/interior authority","Social protection agency","Local government actors","Development finance actors"],"mainGovernancePatterns":["Documentation and eligibility","Registry interoperability","Emergency-to-recovery transition","Municipal absorption","Project-to-system financing"],"reformOpportunities":"Clarify minimum access standards for refugees, integrate displacement triggers into adaptive social protection, support high-displacement localities through fiscal transfers, and require post-project inclusion tracking in infrastructure portfolios.","priorityPublicSystems":["Disaster risk management","Migration and labour","Social protection"],"keyReferenceIds":["indonesia-ministry-of-social-affairs","dtks-portal","siks-ng-portal","world-bank-report-on-improving-data-quality-for-indonesia-s-social-reg","law-no-24-2007-english-translation-pdf","preventionweb-summary-of-indonesia-law-no-24-2007"],"relatedMappingRecordIds":["indonesia-dtks-siks-ng","indonesia-law-24-2007-disaster-management","indonesia-presidential-regulation-125-2016-refugees"]},{"country":"Lao PDR","profileType":"Regional core","overview":"Lao PDR's displacement governance is shaped by disaster exposure, labour mobility, and development-induced displacement. Emerging public systems and constrained fiscal space make continuity between projects, local delivery, and national systems a central concern.","mainDisplacementContexts":["Disaster displacement","Labour mobility","Development-induced displacement"],"institutionalArchitecture":["Disaster management authority","Social protection agency","Local government actors","Planning ministries","Development finance actors"],"mainGovernancePatterns":["Registry interoperability","Territorial portability","Emergency-to-recovery transition","Municipal absorption","Project-to-system financing"],"reformOpportunities":"Build displacement-sensitive triggers into emerging social protection systems, connect resettlement planning to district delivery budgets, and link affected household records to social and local planning registries.","priorityPublicSystems":["Housing, land and resettlement"],"keyReferenceIds":["decree-no-84-on-compensation-and-resettlement-management-in-developmen","land-portal-entry-on-lao-pdr-compensation-and-resettlement-decree","world-bank-resettlement-policy-framework-referencing-decree-84"],"relatedMappingRecordIds":["lao-pdr-compensation-resettlement-development-projects"]},{"country":"Malaysia","profileType":"Regional core","overview":"Malaysia's displacement governance is strongly shaped by refugee/asylum, statelessness, and labour mobility questions. Ordinary systems are comparatively developed, but access for non-citizens and undocumented groups remains highly status-mediated. Since Jan 2026, the government has rolled out its own registration system (DPP), displacing UNHCR as the primary registering authority for refugees without conferring legal status -- a shift in who controls documentation, not in the underlying categorical exclusion.","mainDisplacementContexts":["Refugees","Statelessness","Labour mobility"],"institutionalArchitecture":["Migration/interior authority","Civil registration authorities","Social protection agency","Local government actors","Development finance actors"],"mainGovernancePatterns":["Documentation and eligibility","Registry interoperability","Territorial portability","Municipal absorption","Accountability gaps","State displacement of international registration authority (new, 2026)"],"reformOpportunities":"Establish limited vulnerability-based access protocols, improve civil registration pathways for children at risk of statelessness, and build financing arrangements for urban refugee inclusion.","priorityPublicSystems":["Health"],"keyReferenceIds":["malaysia-ministry-of-health","malaysia-immigration-department","ilo-malaysia-labour-migration-resources"],"relatedMappingRecordIds":["malaysia-foreign-worker-health-protection-scheme"]},{"country":"Myanmar","profileType":"Regional core","overview":"Myanmar's displacement governance is defined by conflict, refugee flows, statelessness, disaster exposure, and fragmented authority. Protection continuity is constrained across documentation systems, areas of control, and disrupted public institutions. The Mar 2025 earthquake compounded conflict displacement, pushing internal displacement toward a projected 4 million in 2026, while international humanitarian financing for the response has contracted sharply (only 26% of the 2025 appeal funded), forcing the 2026 response plan to narrow its geographic and activity scope.","mainDisplacementContexts":["Refugees","Internal displacement","Disaster displacement","Statelessness"],"institutionalArchitecture":["Disaster management authority","Migration/interior authority","Local authorities","Humanitarian coordination actors","Development finance actors"],"mainGovernancePatterns":["Documentation and eligibility","Registry interoperability","Territorial portability","Emergency-to-recovery transition","Municipal absorption","Accountability gaps"],"reformOpportunities":"Protect minimum public support channels across areas of control, prioritize civil documentation pathways, and develop transition scenarios for future restoration of public systems.","priorityPublicSystems":["Social protection"],"keyReferenceIds":["world-bank-press-release-on-myanmar-mcct-financing","world-bank-project-document-text","journal-of-nutrition-study-on-sustained-mcct-benefits","save-the-children-igc-presentation-on-mcct"],"relatedMappingRecordIds":["myanmar-maternal-child-cash-transfer"]},{"country":"Philippines","profileType":"Regional core","overview":"The Philippines has extensive disaster governance and social protection architecture alongside conflict displacement and statelessness concerns. Continuity is comparatively stronger where national systems and local recovery mechanisms are linked, but geography and local capacity still matter. The 2025 Anticipatory Action Law institutionalized pre-disaster planning and financing, directly targeting the temporal gap between disaster activation and sustained recovery financing that this profile already identifies.","mainDisplacementContexts":["Internal displacement","Disaster displacement","Statelessness","Labour mobility"],"institutionalArchitecture":["Disaster management authority","Social protection agency","Local government actors","Migration/interior authority","Development finance actors"],"mainGovernancePatterns":["Registry interoperability","Territorial portability","Emergency-to-recovery transition","Municipal absorption","Accountability gaps"],"reformOpportunities":"Embed recurrent displacement support into social protection and local recovery budgets, link evacuation and relocation records to social registries, and strengthen displacement-sensitive intergovernmental transfers.","priorityPublicSystems":["Disaster risk management","Housing, land and resettlement","Migration and labour","Social protection"],"keyReferenceIds":["dswd-pantawid-pamilyang-pilipino-program","republic-act-no-11310-pdf","official-gazette-republic-act-no-11310","philippine-legal-e-library-republic-act-no-11310","republic-act-no-10121-text","philippine-e-library-republic-act-no-10121"],"relatedMappingRecordIds":["philippines-4ps","philippines-disaster-risk-reduction-management-act","philippines-marawi-rehabilitation-architecture","philippines-migrant-workers-overseas-filipinos-act"]},{"country":"Thailand","profileType":"Regional core","overview":"Thailand combines long-standing refugee and statelessness questions with disaster exposure and regional labour mobility. Governance arrangements are comparatively developed, but continuity often depends on legal status, registration, locality, and administrative discretion. A 2025-26 policy shift -- work permits for long-staying camp-based Myanmar refugees, followed by biometric, civil-registry-integrated ID cards -- is the most significant formalisation of this population's status in decades, though it remains bounded by age, employment, and camp residency rather than extending general legal status.","mainDisplacementContexts":["Refugees","Disaster displacement","Statelessness","Labour mobility"],"institutionalArchitecture":["Migration/interior authority","Disaster management authority","Social protection agency","Local government actors","Development finance actors"],"mainGovernancePatterns":["Documentation and eligibility","Registry interoperability","Territorial portability","Municipal absorption","Project-to-system financing","Phased/cohort-bounded formalisation (new, 2025-26)"],"reformOpportunities":"Create vulnerability-based access protocols for displaced and stateless groups, map displacement-related costs in social protection and local budgets, and pilot portable entitlements in high-mobility border provinces.","priorityPublicSystems":["Civil registration and identity","Cross-sector governance","Health"],"keyReferenceIds":["thailand-ministry-of-public-health","migrant-workers-and-migrants-health-insurance-fund","national-health-security-office","who-thailand-migrant-health-page","implementing-health-insurance-for-migrants-thailand","political-economy-of-thailand-s-tax-financed-universal-coverage-scheme"],"relatedMappingRecordIds":["thailand-migrant-health-insurance-scheme","thailand-universal-coverage-scheme","thailand-civil-registration-statelessness","thailand-refugee-camp-border-assistance-architecture","thailand-cabinet-resolution-statelessness-2024"]},{"country":"Vietnam","profileType":"Regional core","overview":"Vietnam's displacement governance is linked primarily to disaster risk, climate mobility, labour mobility, and infrastructure-linked relocation. Public systems can absorb some displacement-related vulnerability, but household registration, locality, and project follow-up remain important fault lines. The paper ho khau book formally ceased validity on 1 Jan 2023, replaced by an ID-number-linked national population database; officials have been explicit that this is a change in administrative form, not in the underlying logic of residence-tied access. The territorial fault line therefore persists through the digital system rather than being resolved by it.","mainDisplacementContexts":["Disaster displacement","Labour mobility","Development-induced displacement"],"institutionalArchitecture":["Disaster management authority","Social protection agency","Local government actors","Planning ministries","Development finance actors"],"mainGovernancePatterns":["Registry interoperability","Territorial portability","Emergency-to-recovery transition","Project-to-system financing","Accountability gaps"],"reformOpportunities":"Improve portability for mobile households, integrate displacement costs into climate adaptation and urban planning budgets, and track post-project livelihood and inclusion outcomes.","priorityPublicSystems":["Civil registration and identity"],"keyReferenceIds":["law-on-residence-68-2020-qh14-english-text","vietnam-law-magazine-management-of-citizen-residence-to-be-digitalized","vietnamnet-online-residence-registration"],"relatedMappingRecordIds":["vietnam-residence-law-household-registration-reform"]},{"country":"Bangladesh","profileType":"Comparative case","overview":"Bangladesh is included as a comparative refugee-hosting case, centred on the registration and humanitarian governance architecture for Rohingya refugees.","mainDisplacementContexts":["Refugee hosting"],"institutionalArchitecture":[],"mainGovernancePatterns":["Humanitarian registration creates administrative visibility but does not by itself establish domestic legal status or inclusion in ordinary public systems."],"reformOpportunities":[],"priorityPublicSystems":["Civil registration and identity"],"keyReferenceIds":["unhcr-joint-bangladesh-unhcr-verification-gets-underway","unhcr-rohingya-refugees-receive-identity-documents","unhcr-bangladesh-registration-faq","unhcr-operational-data-portal-myanmar-situation"],"relatedMappingRecordIds":["bangladesh-unhcr-rohingya-registration"]},{"country":"Colombia","profileType":"Comparative case","overview":"Colombia is included as a comparative case because its victim-registration and social-protection architecture offers a mature example of linking displacement recognition to public programmes.","mainDisplacementContexts":["Internal displacement"],"institutionalArchitecture":[],"mainGovernancePatterns":["Rights-bearing registration can connect displaced populations to assistance and reparations, while implementation remains constrained by fiscal and territorial capacity."],"reformOpportunities":[],"priorityPublicSystems":["Social protection"],"keyReferenceIds":["unidad-para-las-v-ctimas-registro-nico-de-v-ctimas","unidad-en-l-nea","unidad-para-las-v-ctimas-official-website","infopa-lante-explainer-on-the-ruv"],"relatedMappingRecordIds":["colombia-registro-unico-victimas"]}]}</script></head><body class="mapping-page"><a class="skip-link" href="#main">Skip to content</a><header class="site-header"><div class="container header-inner"><a class="brand" href="/" aria-label="Displacement Policy home"><img src="/assets/brand/dp-logo-primary.svg" alt="Displacement Policy" width="420" height="180" decoding="async"></a><button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav"><span class="nav-toggle-line"></span><span class="nav-toggle-line"></span><span class="nav-toggle-line"></span><span class="sr-only">Toggle navigation</span></button><nav class="site-nav" id="site-nav" aria-label="Primary navigation"><a href="/research">Research</a><a href="/mapping" aria-current="page">Mapping</a><a href="/perspectives">Perspectives</a><a href="/publications">Publications</a><a href="/about">About</a></nav></div></header><main id="main"><section class="mapping-project-hero" aria-labelledby="mapping-title"><div class="container editorial-column mapping-hero-column"><p class="eyebrow">Mapping</p><h1 id="mapping-title">Displacement Governance Mapping</h1><p class="subtitle">A qualitative mapping of governance, institutional responsibility, and fiscal authority across displacement-related sectors in Southeast Asia.</p></div></section><section class="section section-compact" aria-labelledby="mapping-tool-title"><div class="container mapping-shell"><div class="mapping-control-surface"><div class="mapping-search"><input type="search" data-search placeholder="Search countries, systems, institutions, policies or cases" aria-label="Search countries, systems, institutions, policies or cases"></div><div class="mode-switch" aria-label="Mapping route"><button type="button" data-mode="country" class="is-active">By country</button><button type="button" data-mode="publicSystem">By public system</button></div><div class="mapping-filter-grid"><label><span>Country</span><select class="mapping-select" data-country></select></label><label><span>Public system</span><select class="mapping-select" data-system></select></label><label><span>Displacement context</span><select class="mapping-select" data-context></select></label><label><span>Instrument / response type</span><select class="mapping-select" data-instrument></select></label></div></div><div data-output></div><div class="mapping-footer-links"><a href="/mapping/references/">Browse references and instruments</a><a href="/mapping/methodology/">Methodology</a></div></div></section><script>const data=JSON.parse(document.getElementById('mapping-data').textContent);
const ALL='all';
const defaultCountry=data.profiles[0]?.country||ALL;
const defaultPublicSystem=data.records[0]?.publicSystem||ALL;
const filters={mode:'country',search:'',country:defaultCountry,publicSystem:ALL,displacementContext:ALL,instrumentResponseType:ALL};
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const arr=v=>Array.isArray(v)?v:v?[v]:[];
const uniq=v=>Array.from(new Set(v.filter(Boolean)));
const option=(value,label)=>'<option value="'+esc(value)+'">'+esc(label)+'</option>';
const refsById=Object.fromEntries(data.references.map(ref=>[ref.id,ref]));
const recordsById=Object.fromEntries(data.records.map(record=>[record.id,record]));
function searchable(record){return [record.title,...arr(record.countryRegion),record.publicSystem,...arr(record.displacementContext),record.instrumentResponseType,record.description,record.whyItMatters].join(' ').toLowerCase()}
function applyMappingFilters(records, activeFilters){return records.filter(record=>(activeFilters.country===ALL||arr(record.countryRegion).includes(activeFilters.country))&&(activeFilters.publicSystem===ALL||record.publicSystem===activeFilters.publicSystem)&&(activeFilters.displacementContext===ALL||arr(record.displacementContext).includes(activeFilters.displacementContext))&&(activeFilters.instrumentResponseType===ALL||record.instrumentResponseType===activeFilters.instrumentResponseType)&&(!activeFilters.search||searchable(record).includes(activeFilters.search.toLowerCase())))}
function compactMeta(record){return [arr(record.countryRegion).join('; '),record.publicSystem,arr(record.displacementContext).join('; '),record.instrumentResponseType].filter(Boolean).join(' · ')}
function card(record){return '<article class="mapping-card"><p class="mapping-card__meta">'+esc(compactMeta(record))+'</p><h3><a href="/mapping/'+esc(record.slug)+'/">'+esc(record.title)+'</a></h3><p>'+esc(record.description)+'</p><p><strong>Why it matters:</strong> '+esc(record.whyItMatters)+'</p><a class="text-link" href="/mapping/'+esc(record.slug)+'/">View record</a></article>'}
function listItems(items){items=arr(items).filter(Boolean);return items.length?'<ul>'+items.map(item=>'<li>'+esc(item)+'</li>').join('')+'</ul>':''}
function diagnosticItem(title,items){const body=listItems(items);return body?'<div class="mapping-diagnostic-item"><h3>'+esc(title)+'</h3>'+body+'</div>':''}
function visibleReferences(filteredRecords,extraIds=[],extraFirst=true){const recordIds=filteredRecords.flatMap(record=>arr(record.referenceIds));const ordered=extraFirst?[...extraIds,...recordIds]:[...recordIds,...extraIds];const seen=new Set();return ordered.map(id=>refsById[id]).filter(ref=>ref&&!seen.has(ref.id)&&seen.add(ref.id))}
function compactApplicability(ref){const text=ref.applicability||'';return /continuity|break|constraint|limit|depends|when|where|without|unless/i.test(text)?text:''}
function refMeta(ref){const countries=arr(ref.countryRegion).join('; ');return [countries,ref.referenceType,ref.authorInstitution].filter(Boolean).join(' · ')}
function referencePanel(refs,heading){if(!refs.length)return '';return '<section class="reference-panel mapping-section"><h2 class="mapping-section-title">'+esc(heading)+'</h2><ul class="reference-list">'+refs.slice(0,8).map(ref=>'<li class="reference-row"><strong><a href="/mapping/references/'+esc(ref.slug)+'/">'+esc(ref.referenceTitle)+'</a></strong><p class="reference-row__meta">'+esc(refMeta(ref))+'</p>'+(ref.relevance?'<p>'+esc(ref.relevance)+'</p>':'')+(compactApplicability(ref)?'<p>'+esc(compactApplicability(ref))+'</p>':'')+(ref.url?'<a class="text-link" href="'+esc(ref.url)+'">Source link</a>':'')+'</li>').join('')+'</ul>'+(refs.length>8?'<a class="text-link" href="/mapping/references/">View all related references</a>':'')+'</section>'}
function grouped(records,keyFn){return records.reduce((acc,record)=>{const key=keyFn(record)||'Other';(acc[key]??=[]).push(record);return acc},{})}
function emptyMessage(){return '<p class="inline-empty">No mapping examples are currently available for this combination. <button type="button" class="clear-filters" data-clear-filters>Clear filters</button></p>'}
function sectionExamples(title,groups){const entries=Object.entries(groups);if(!entries.length)return '';return '<section class="mapping-section"><h2 class="mapping-section-title">'+esc(title)+'</h2>'+entries.map(([heading,items])=>'<h3 class="mapping-country-heading">'+esc(heading)+'</h3><div class="mapping-grid">'+items.map(card).join('')+'</div>').join('')+'</section>'}
function renderCountry(filteredRecords){const profile=data.profiles.find(item=>item.country===filters.country)||data.profiles[0];const secondaryActive=filters.publicSystem!==ALL||filters.displacementContext!==ALL||filters.instrumentResponseType!==ALL||Boolean(filters.search);let html='<section class="mapping-panel mapping-summary"><p class="eyebrow">Country profile</p><h2>'+esc(profile.country)+'</h2><p>'+esc(profile.overview)+'</p><p class="result-count">'+filteredRecords.length+' mapping '+(filteredRecords.length===1?'example':'examples')+'</p></section>';
const diagnostic=diagnosticItem('Institutional architecture',profile.institutionalArchitecture)+diagnosticItem('Main governance patterns',profile.mainGovernancePatterns)+diagnosticItem('Reform opportunities',profile.reformOpportunities);
if(diagnostic)html+='<section class="mapping-section"><h2 class="mapping-section-title">Diagnostic summary</h2><div class="mapping-diagnostic-grid">'+diagnostic+'</div></section>';
if(filteredRecords.length){html+=sectionExamples('Examples from the mapping',grouped(filteredRecords,record=>record.publicSystem));html+=referencePanel(visibleReferences(filteredRecords,arr(profile.keyReferenceIds),!secondaryActive),'Key references and instruments')}else{html+=emptyMessage()}
$('[data-output]').innerHTML=html}
function renderPublicSystem(filteredRecords){let html='<section class="mapping-panel mapping-summary"><p class="eyebrow">Public system</p><h2>'+esc(filters.publicSystem)+'</h2><p>'+esc(systemIntro(filters.publicSystem))+'</p><p class="result-count">'+filteredRecords.length+' mapping '+(filteredRecords.length===1?'example':'examples')+'</p></section>';
if(filteredRecords.length){html+=sectionExamples('Examples by country',grouped(filteredRecords,record=>arr(record.countryRegion).join('; ')||'Regional / global'));html+=referencePanel(visibleReferences(filteredRecords),'Selected references and instruments')}else{html+=emptyMessage()}
$('[data-output]').innerHTML=html}
function systemIntro(system){const intros={'Health':'Health examples show how displaced and mobile populations are included or excluded through ordinary coverage systems, sectoral insurance, and public health financing.','Social protection':'Social protection examples trace how cash, registries, targeting rules, and portability shape continuity after displacement.','Disaster risk management':'Disaster risk management examples focus on the handoff from preparedness and response into recovery, financing, and sustained public support.','Migration and labour':'Migration and labour examples examine how legal status, work authorization, and administrative recognition affect access to public systems.','Civil registration and identity':'Civil registration and identity examples show how documentation, registration, and databases mediate access to rights and services.','Local government':'Local government examples examine the municipal and subnational responsibilities that absorb displacement-related costs.','Housing, land and resettlement':'Housing, land and resettlement examples focus on relocation, compensation, tenure, and post-project inclusion.','Public and development finance':'Public and development finance examples examine how grants, loans, budget windows, and concessional instruments allocate fiscal responsibility.','Cross-sector governance':'Cross-sector governance examples show how responsibility is coordinated across institutions, sectors, and levels of government.'};return intros[system]||'Examples in this public system show how responsibility is assigned, financed, and handed off across displacement-related sectors.'}
function syncControls(){document.querySelectorAll('[data-mode]').forEach(button=>button.classList.toggle('is-active',button.dataset.mode===filters.mode));$('[data-search]').value=filters.search;$('[data-country]').value=filters.country;$('[data-system]').value=filters.publicSystem;$('[data-context]').value=filters.displacementContext;$('[data-instrument]').value=filters.instrumentResponseType}
function render(){syncControls();const filteredRecords=applyMappingFilters(data.records,filters);if(filters.mode==='country')renderCountry(filteredRecords);else renderPublicSystem(filteredRecords)}
function setCountryMode(){filters.mode='country';filters.search='';filters.country=defaultCountry;filters.publicSystem=ALL;filters.displacementContext=ALL;filters.instrumentResponseType=ALL;render()}
function setPublicSystemMode(){filters.mode='publicSystem';filters.search='';filters.country=ALL;filters.publicSystem=defaultPublicSystem;filters.displacementContext=ALL;filters.instrumentResponseType=ALL;render()}
function clearFilters(){filters.search='';filters.displacementContext=ALL;filters.instrumentResponseType=ALL;if(filters.mode==='country')filters.publicSystem=ALL;if(filters.mode==='publicSystem')filters.country=ALL;render()}
function init(){const countries=uniq(data.profiles.map(profile=>profile.country));const systems=uniq(data.records.map(record=>record.publicSystem));const contexts=uniq(data.records.flatMap(record=>arr(record.displacementContext)));const instruments=uniq(data.records.map(record=>record.instrumentResponseType));$('[data-country]').innerHTML=option(ALL,'All countries')+countries.map(country=>option(country,country)).join('');$('[data-system]').innerHTML=option(ALL,'All public systems')+systems.map(system=>option(system,system)).join('');$('[data-context]').innerHTML=option(ALL,'All displacement contexts')+contexts.map(context=>option(context,context)).join('');$('[data-instrument]').innerHTML=option(ALL,'All instrument / response types')+instruments.map(instrument=>option(instrument,instrument)).join('');$('[data-search]').addEventListener('input',event=>{filters.search=event.target.value;render()});$('[data-country]').addEventListener('change',event=>{filters.country=event.target.value;if(filters.mode==='country'){filters.publicSystem=ALL;filters.displacementContext=ALL;filters.instrumentResponseType=ALL}render()});$('[data-system]').addEventListener('change',event=>{filters.publicSystem=event.target.value;if(filters.mode==='publicSystem'){filters.country=ALL;filters.displacementContext=ALL;filters.instrumentResponseType=ALL}render()});$('[data-context]').addEventListener('change',event=>{filters.displacementContext=event.target.value;render()});$('[data-instrument]').addEventListener('change',event=>{filters.instrumentResponseType=event.target.value;render()});$('[data-output]').addEventListener('click',event=>{if(event.target.matches('[data-clear-filters]'))clearFilters()});$$('[data-mode]').forEach(button=>button.addEventListener('click',()=>{if(button.dataset.mode==='country')setCountryMode();else setPublicSystemMode()}));render()}
init();</script></main><div id="footer-placeholder"></div><script>fetch('/footer.html').then(response=>response.text()).then(html=>{document.getElementById('footer-placeholder').innerHTML=html}).catch(()=>{});</script><script src="/script.js"></script></body></html>
